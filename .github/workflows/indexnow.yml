name: IndexNow Submission

# ========================================================================
# ARCHITECTURE NOTE:
# This GitHub Action is intended as a FALLBACK and MANUAL trigger for 
# development environments. 
#
# DO NOT tightly couple production notification logic to GitHub Actions.
# Since Vercel deployments are asynchronous, a GitHub Action triggered on 
# push may execute before Vercel completes the live deployment, causing
# 404s for the newly generated key or updated URLs.
#
# RECOMMENDED PRODUCTION ARCHITECTURE:
# Git Push -> GitHub -> Vercel Build -> Vercel Deployment Success -> 
# Run IndexNow Submission (via Vercel Deploy Hook/Serverless Function) -> 
# Notify Bing + IndexNow Search Engines
# ========================================================================

on:
  workflow_dispatch: # Manual trigger
  push:
    branches:
      - main # Retained for development, but consider disabling for pure Vercel webhook architecture

jobs:
  indexnow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      # Wait for Vercel deployment if relying on push (not recommended for strict production without API checks)
      - name: Wait for Vercel (Development Fallback)
        if: github.event_name == 'push'
        run: sleep 45 

      - name: Run IndexNow Submission
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: npm run indexnow
